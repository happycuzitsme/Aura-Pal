<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura-Pal Dashboard ✨</title>
    <!-- Modern Tech Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for cute icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Rich interactive background elements -->
    <div class="background-animation"></div>
    <canvas id="particleCanvas"></canvas>
    
    <!-- Fidget Orb -->
    <div class="fidget-orb-container" id="fidgetOrb">
        <div class="orb-core"></div>
        <div class="orb-ring ring-1"></div>
        <div class="orb-ring ring-2"></div>
        <div class="orb-ring ring-3"></div>
    </div>
    
    <div class="container">
        <!-- Subtle Branding -->
        <header class="header">
            <div class="logo">
                Aura-Pal
            </div>
        </header>

        <!-- Emotion Advice/Quote Box (Top Right) -->
        <div class="quote-area">
            <div class="quote-box glass-panel">
                <i class="fa-solid fa-quote-left quote-icon"></i>
                <p id="emotionQuote">"Waiting to see your beautiful smile..."</p>
            </div>
        </div>

        <!-- Big Minimal Reactive Face -->
        <div class="central-face-container">
            <div class="reactive-face face-neutral" id="bigFace">
                <div class="eyes">
                    <div class="eye left-eye"></div>
                    <div class="eye right-eye"></div>
                </div>
                <div class="mouth"></div>
                
                <!-- Emotion Decorations -->
                <div class="decorations">
                    <div class="tear left-tear"></div>
                    <div class="tear right-tear"></div>
                    <!-- Angry Marks -->
                    <div class="angry-mark left-mark">💢</div>
                    <div class="angry-mark right-mark">💢</div>
                    <div class="sweat"></div>
                    <div class="sparkle left-sparkle">✨</div>
                    <div class="sparkle right-sparkle">✨</div>
                    <div class="bubble bubble-1"></div>
                    <div class="bubble bubble-2"></div>
                    <div class="shiver-line shiver-1"></div>
                    <div class="shiver-line shiver-2"></div>
                    <div class="zzz">z</div>
                </div>
            </div>
            
            <div class="emotion-label-container" id="currentEmotion">
                <h3 id="emotionText">Neutral</h3>
                <p>Confidence: <span id="emotionConfidence">0.0</span>%</p>
            </div>
        </div>

        <!-- Camera Area (Bottom Left) -->
        <div class="camera-area">
            <section class="camera-section glass-panel">
                <div class="video-container">
                    <div class="video-placeholder" id="videoPlaceholder">
                        <i class="fa-solid fa-video-slash"></i>
                        <p id="placeholderText">ESP32 Feed...</p>
                    </div>
                    <!-- Sample src image for mock presentation, and webcam output -->
                    <img id="videoStream" src="" alt="Live Video Feed" style="display: none;">
                    <video id="webcamStream" autoplay playsinline style="display: none; width: 100%; height: 100%; object-fit: cover;"></video>
                    
                    <!-- Decorative scanner line indicating processing -->
                    <div class="scanner-line"></div>
                </div>
                <div class="controls-overlay">
                    <button class="btn active" id="btn-esp32" title="ESP32"><i class="fa-solid fa-microchip"></i></button>
                    <button class="btn" id="btn-webcam" title="Webcam"><i class="fa-solid fa-video"></i></button>
                    <label class="btn btn-label" for="image-upload" id="btn-image" title="Upload">
                        <i class="fa-solid fa-image"></i>
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    </label>
                </div>
            </section>
        </div>

        <!-- Emotion Actions / Controls (Bottom Rightish / Testing) -->
        <div class="manual-triggers-area">
             <div class="button-row emotions-row">
                 <button class="btn-emo" data-emo="Happy">Happy</button>
                 <button class="btn-emo" data-emo="Sad">Sad</button>
                 <button class="btn-emo" data-emo="Angry">Angry</button>
                 <button class="btn-emo" data-emo="Surprise">Surprise</button>
                 <button class="btn-emo" data-emo="Neutral">Neutral</button>
                 <button class="btn-emo" data-emo="Disgust">Disgust</button>
                 <button class="btn-emo" data-emo="Fear">Fear</button>
             </div>
        </div>

        <!-- Emotion Stats (Right Area - Hover Reveal) -->
        <div class="stats-area-wrapper">
            <div class="stats-trigger">
                <i class="fa-solid fa-chart-simple"></i>
                <span>Stats</span>
            </div>
            <div class="stats-area">
                <section class="emotion-section glass-panel">
                    <div class="panel-header">
                        <h2>Stats</h2>
                    </div>
                    <div class="emotion-stats">
                        <div class="stat-row">
                            <span>Happy</span>
                            <div class="progress-bar"><div class="progress fill-happy" id="bar-happy" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-row">
                            <span>Sad</span>
                            <div class="progress-bar"><div class="progress fill-sad" id="bar-sad" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-row">
                            <span>Angry</span>
                            <div class="progress-bar"><div class="progress fill-angry" id="bar-angry" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-row">
                            <span>Surprise</span>
                            <div class="progress-bar"><div class="progress fill-surprise" id="bar-surprise" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-row">
                            <span>Neutral</span>
                            <div class="progress-bar"><div class="progress fill-neutral" id="bar-neutral" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-row">
                            <span>Disgust</span>
                            <div class="progress-bar"><div class="progress fill-disgust" id="bar-disgust" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-row">
                            <span>Fear</span>
                            <div class="progress-bar"><div class="progress fill-fear" id="bar-fear" style="width: 0%"></div></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
